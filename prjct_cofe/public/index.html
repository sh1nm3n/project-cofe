<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beans & Brew | Specialty Coffee House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo">B<span>&</span>B</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Главная</a></li>
                <li><a href="menu.html">Меню</a></li>
                <li><a href="contact.html">Контакты</a></li>
                <span id="userStatus" style="margin-left: 1rem; color: #8B4513; font-weight: 600;"></span>
                <li><a href="auth.html" id="authLink" style="margin-left: 1rem;">Личный кабинет</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-premium">
        <div class="container hero-split">
            <div class="hero-content">
                <span class="subtitle">Искусство обжарки</span>
                <h1>Кофе,<br> за которым<br> возвращаются</h1>
                <p>Мы находим редкие лоты specialty кофе и раскрываем их истинный вкус в нашей собственной обжарочной лаборатории.</p>
                <a href="menu.html" class="btn-premium">Исследовать меню</a>
            </div>
        </div>
    </section>

    <script>
        function checkUserStatus() {
            const user = JSON.parse(localStorage.getItem('user-data') || 'null');
            const token = localStorage.getItem('user-token');
            
            const userStatus = document.getElementById('userStatus');
            const authLink = document.getElementById('authLink');
            
            if (user && token) {
                userStatus.textContent = `👤 ${user.username}`;
                authLink.textContent = 'Выйти';
                authLink.onclick = (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user-token');
                    localStorage.removeItem('user-data');
                    location.reload();
                };
            } else {
                userStatus.textContent = '';
                authLink.textContent = 'Войти';
                authLink.href = 'auth.html';
                authLink.onclick = null;
            }
        }
        
        document.addEventListener('DOMContentLoaded', checkUserStatus);
    </script>
</body>
</html>
