<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-Панель - Кофейня</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #c6a664;
            --accent-hover: #e0c990;
            --border: #333333;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
        .logout-btn {
            padding: 8px 16px;
            background-color: #c6a664;
            color: #121212;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover {
            background-color: var(--accent-hover);
        }
        .admin-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }
        .form-section, .menu-list-section {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        h2 {
            color: var(--accent);
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: #2c2c2c;
            color: var(--text-main);
        }
        .btn-submit {
            padding: 12px 20px;
            background-color: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit:hover {
            background-color: var(--accent-hover);
        }
        .menu-item {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .menu-item h4 {
            margin: 0 0 5px 0;
            color: var(--accent);
        }
        .menu-item .price {
            font-weight: bold;
            color: var(--accent);
        }
        .menu-actions {
            margin-top: 10px;
        }
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            margin-right: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-edit {
            background-color: #4CAF50;
            color: white;
        }
        .btn-delete {
            background-color: #f44336;
            color: white;
        }
        .btn-edit:hover { background-color: #45a049; }
        .btn-delete:hover { background-color: #da190b; }
        .edit-form {
            margin-top: 15px;
            padding: 10px;
            background-color: #2c2c2c;
            border-radius: 4px;
        }
        .edit-form .form-group {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Admin Panel & Co.</div>
            <span>Привет, <span id="welcome-username"></span>!</span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </header>

        <div class="admin-content">
            <section class="form-section">
                <h2>Добавить новую позицию</h2>
                <form id="addItemForm">
                    <div class="form-group">
                        <label for="itemName">Название:</label>
                        <input type="text" id="itemName" name="itemName" required>
                    </div>
                    <div class="form-group">
                        <label for="itemCategory">Категория *</label>
                        <select id="itemCategory" name="category" required>
                            <option value="Классика и Авторские напитки">Классика и Авторские напитки</option>
                            <option value="Десерты">Десерты</option>
                            <option value="Холодные напитки">Холодные напитки</option>
                            <option value="Чай и Альтернатива">Чай и Альтернатива</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemDescription">Описание:</label>
                        <textarea id="itemDescription" name="itemDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="itemPrice">Цена:</label>
                        <input type="number" id="itemPrice" name="itemPrice" step="0.01" min="0" required>
                    </div>
                    <button type="submit" class="btn-submit">Добавить в Меню</button>
                </form>
            </section>

            <section class="menu-list-section">
                <h2>Текущее Меню</h2>
                <div id="menuList">
                </div>
            </section>
        </div>
    </div>

    <script src="../cofe_backend/js/admin-panel.js"></script>
</body>
</html>
