<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация | Beans & Brew</title>
    <style>
        :root {
            --primary: #8B4513;
            --primary-dark: #6B3410;
            --bg: #FAF5F0;
            --card: #FFFFFF;
            --text: #333333;
            --error: #dc3545;
            --success: #28a745;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Хедер */
        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: opacity 0.3s;
        }
        
        .nav a:hover {
            opacity: 0.8;
        }
        
        /* Основной контейнер */
        main {
            max-width: 500px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
        
        /* Карточка формы */
        .auth-container {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* Переключатель вход/регистрация */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        
        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .auth-tab.active {
            background: var(--card);
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }
        
        .auth-tab:hover {
            background: #eee;
        }
        
        /* Форма */
        .auth-form {
            padding: 2rem;
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .auth-form h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* Сообщения */
        .message {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        /* Информация о пользователе */
        .user-info {
            text-align: center;
            padding: 2rem;
        }
        
        .user-info h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .user-info p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        
        .user-actions {
            display: flex;
            gap: 1rem;
        }
        
        .user-actions .btn {
            flex: 1;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        /* Футер */
        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">☕ Капучинка</div>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="menu.html">Меню</a>
            <a href="auth.html">Вход</a>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <!-- Переключатель -->
            <div class="auth-tabs" id="authTabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form class="auth-form active" id="loginForm">
                <h2>🔐 Вход в аккаунт</h2>
                <div class="message" id="loginMessage"></div>
                
                <div class="form-group">
                    <label for="loginUsername">Имя пользователя или Email</label>
                    <input type="text" id="loginUsername" required placeholder="ваш@email.com">
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn" id="loginBtn">Войти</button>
            </form>

            <!-- Форма регистрации -->
            <form class="auth-form" id="registerForm">
                <h2>📝 Регистрация</h2>
                <div class="message" id="registerMessage"></div>
                
                <div class="form-group">
                    <label for="regUsername">Имя пользователя</label>
                    <input type="text" id="regUsername" required placeholder="От 3 до 50 символов">
                </div>
                
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" required placeholder="Минимум 6 символов">
                </div>
                
                <button type="submit" class="btn" id="registerBtn">Зарегистрироваться</button>
            </form>

            <!-- Информация о пользователе (после входа) -->
            <div class="auth-form" id="userInfo">
                <div class="user-info">
                    <h3 id="welcomeUser">Добро пожаловать!</h3>
                    <p id="userDetails"></p>
                    <div class="user-actions">
                        <button class="btn btn-secondary" onclick="goToMain()">Перейти на главную страницу</button>
                        <button class="btn" onclick="logout()">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Капучинка. Specialty Coffee House</p>
    </footer>

    <script src="../cofe_backend/js/authorization.js"></script>
</body>
</html>
