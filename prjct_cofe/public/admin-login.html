<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в Админ-панель</title>
    <style>
         body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #c6a664;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #c6a664;
            color: #121212;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-login:hover {
            background-color: #e0c990;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Админ-Панель</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Логин:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Войти</button>
            <div id="login-error" class="error-message"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', { // URL вашего сервера
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUsername', data.username);
                    window.location.href = 'admin-panel.html';
                } else {
                    document.getElementById('login-error').textContent = data.error || 'Ошибка входа.';
                }

                // 🔑 СОХРАНЯЕМ ТОКЕН!
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminUsername', data.username);
                
                console.log('✅ Вход успешен. Токен:', data.token.substring(0, 20) + '...');
                
                window.location.href = 'admin-panel.html';
            } catch (error) {
                console.error("Ошибка запроса:", error);
                document.getElementById('login-error').textContent = 'Ошибка соединения с сервером.';
            }
        });
    </script>
</body>
</html>
