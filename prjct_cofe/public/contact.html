<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Beans & Brew</title>
    <link rel="stylesheet" href="css/cofe.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Капу<span>ч</span>инка</a>
                <ul class="nav-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="menu.html">Меню</a></li>
                    <li><a href="contact.html" class="active">Контакты</a></li>
                    <span id="userStatus" style="margin-left: 1rem; color: #8B4513; font-weight: 600;"></span>
                    <li><a href="auth.html" id="authLink">Войти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="contact">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <span class="subtitle">Свяжитесь с нами</span>
                    <h2 class="section-title">Ждем вас</h2>
                    
                    <div class="contact-details">
                        <div class="contact-item">
                            <span class="contact-icon">📍</span>
                            <p>ул. Кофейная панорама, 12, Центр</p>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">🕐</span>
                            <p>Ежедневно: 08:00 — 23:00</p>
                        </div>
                    </div>
                </div>

                <div class="contact-form">
                    <form id="contactForm">
                        <div class="form-group">
                            <input type="text" id="contactName" name="name" placeholder=" " required>
                            <label for="contactName">Ваше имя *</label>
                        </div>
                        
                        <div class="form-group">
                            <input type="email" id="contactEmail" name="email" placeholder=" " required>
                            <label for="contactEmail">Ваш Email *</label>
                        </div>
                        
                        <div class="form-group">
                            <input type="tel" id="contactPhone" name="phone" placeholder=" ">
                            <label for="contactPhone">Телефон</label>
                        </div>
                        
                        <div class="form-group">
                            <textarea id="contactMessage" name="message" placeholder=" " rows="5" required></textarea>
                            <label for="contactMessage">Ваш запрос (или бронь столика) *</label>
                        </div>
                        
                        <button type="submit" class="btn-primary" id="submitBtn">Отправить</button>
                    </form>
                    
                    <div id="formMessage" style="margin-top: 20px; padding: 15px; border-radius: 50px; display: none; text-align: center;"></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Капучинка. Specialty Coffee House</p>
        </div>
    </footer>

    <script src="../cofe_backend/js/contact-form.js"></script>
        
</body>
</html>
